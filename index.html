<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN PHÚC EDUCATION</title>
    <style>
        :root { --primary: #1e3a8a; --white: #ffffff; --active-bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Logo từ GitHub */
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; border: 2px solid white; }
        
        /* Tab bôi đen khi chọn */
        .tabs { display: flex; background: #cbd5e1; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; color: #475569; border-radius: 6px; }
        .tab-btn.active { background: var(--active-bg); color: white; }
        
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: white; overflow-y: auto; padding: 15px; border-right: 1px solid #e2e8f0; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        .caret { cursor: pointer; display: block; padding: 6px; font-weight: 500; }
        .nested { display: none; margin-left: 15px; list-style: none; padding-left: 5px; border-left: 1px solid #ddd; }
        .active-node { display: block; }
        .item-leaf { cursor: pointer; padding: 6px 10px; color: #334155; border-radius: 4px; }
        .item-leaf:hover { background: #eff6ff; color: var(--primary); }

        /* Tối ưu mã đề nằm dưới cho điện thoại */
        .exam-container { width: 100%; max-width: 450px; text-align: center; }
        .code-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .code-item { padding: 15px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .admin-box { margin-top: 20px; padding: 15px; background: #fffbeb; border: 1px solid #f59e0b; border-radius: 8px; display: none; width: 100%; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        
        #loading { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 99; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading">🚀 ĐANG KẾT NỐI HỆ THỐNG...</div>

<header>
    <div class="logo-area">
        <img src="https://raw.githubusercontent.com/LeHoangNgocDuc/LinkdethiAnPhuc_V2/main/logo.jpg" class="logo-img" alt="An Phúc Logo">
        <span style="font-weight: bold;">AN PHÚC EDUCATION</span>
    </div>
    <button onclick="loginGV()" id="btnGV" style="background:none; border:1px solid white; color:white; padding:4px 10px; cursor:pointer;">🔒 GV</button>
</header>

<div class="tabs">
    <button class="tab-btn active" id="tabReg" onclick="switchTab('regular')">THƯỜNG XUYÊN</button>
    <button class="tab-btn" id="tabPer" onclick="switchTab('periodic')">ĐỊNH KỲ</button>
</div>

<div class="main-container">
    <div class="sidebar" id="sidebarContent"></div>
    <div class="content-area">
        <div id="placeholder" style="color:#94a3b8; margin-top:40px; text-align:center;">👈 Chọn bài thi ở danh mục bên trái</div>
        <div id="examCard" class="exam-container hidden">
            <h2 id="examTitle" style="color:var(--primary); margin-bottom:5px;"></h2>
            <div id="codeList" class="code-list"></div>

            <div id="adminPanel" class="admin-box">
                <label style="font-size:12px; font-weight:bold;">SỬA MÃ ĐỀ (CÁCH NHAU DẤU PHẨY):</label>
                <input type="text" id="inputCodes">
                <button onclick="updateCodes()" style="width:100%; padding:10px; background:#f59e0b; color:white; border:none; font-weight:bold; cursor:pointer;">CẬP NHẬT MÃ ĐỀ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzPcgfWUfgnpJTb0oC3-bIgAlRpf_r3GnXxdy0ANuu1_11mcrBMl4UJj4oUsX_fDmMxWA/exec";
    let regData = [], perData = [], currentTab = 'regular', isAdmin = false, currentItem = null;

    async function init() {
        const [r, p] = await Promise.all([
            fetch(API + "?action=getRegular").then(res => res.json()),
            fetch(API + "?action=getPeriodic").then(res => res.json())
        ]);
        regData = r; perData = p;
        document.getElementById('loading').style.display = 'none';
        renderSidebar();
    }

    function renderSidebar() {
        const root = document.getElementById('sidebarContent');
        root.innerHTML = "";
        const data = (currentTab === 'regular') ? regData : perData;
        const tree = {};

        data.forEach(item => {
            if (currentTab === 'regular') {
                if (!tree[item.grade]) tree[item.grade] = {};
                if (!tree[item.grade][item.chapter]) tree[item.grade][item.chapter] = [];
                tree[item.grade][item.chapter].push(item);
            } else {
                if (!tree[item.grade]) tree[item.grade] = {};
                if (!tree[item.grade][item.year]) tree[item.grade][item.year] = {};
                if (!tree[item.grade][item.year][item.category]) tree[item.grade][item.year][item.category] = [];
                tree[item.grade][item.year][item.category].push(item);
            }
        });
        buildTree(tree, root);
    }

    function buildTree(obj, parent) {
        for (let k in obj) {
            let li = document.createElement('li');
            if (Array.isArray(obj[k])) {
                li.innerHTML = `<span class="caret">📁 ${k}</span>`;
                let ul = document.createElement('ul'); ul.className = "nested";
                obj[k].forEach(i => {
                    let leaf = document.createElement('li');
                    leaf.className = "item-leaf";
                    leaf.innerText = "📄 " + (i.lesson || i.displayName);
                    leaf.onclick = () => showExam(i);
                    ul.appendChild(leaf);
                });
                li.querySelector('.caret').onclick = function() { this.nextSibling.classList.toggle('active-node'); };
                li.appendChild(ul);
            } else {
                li.innerHTML = `<span class="caret">📂 ${k}</span>`;
                let ul = document.createElement('ul'); ul.className = "nested";
                buildTree(obj[k], ul);
                li.querySelector('.caret').onclick = function() { this.nextSibling.classList.toggle('active-node'); };
                li.appendChild(ul);
            }
            parent.appendChild(li);
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.getElementById('tabReg').classList.toggle('active', t==='regular');
        document.getElementById('tabPer').classList.toggle('active', t==='periodic');
        document.getElementById('examCard').classList.add('hidden');
        document.getElementById('placeholder').style.display = 'block';
        renderSidebar();
    }

    function showExam(item) {
        currentItem = item;
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('examCard').classList.remove('hidden');
        document.getElementById('examTitle').innerText = item.lesson || item.displayName;
        
        const list = document.getElementById('codeList');
        list.innerHTML = item.code ? "" : "<p style='color:#94a3b8'>Chưa có mã đề thi</p>";
        if(item.code) {
            item.code.toString().split(',').forEach(c => {
                let div = document.createElement('div');
                div.className = "code-item";
                div.innerHTML = `VÀO THI: <span style="color:var(--primary)">${c.trim()}</span>`;
                div.onclick = () => {
                    const url = c.trim().startsWith('http') ? c.trim() : "https://google.com/search?q=" + encodeURIComponent(c.trim());
                    window.open(url, '_blank');
                };
                list.appendChild(div);
            });
        }
        if(isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('inputCodes').value = item.code || "";
        }
    }

    function loginGV() {
        const p = prompt("Nhập mật khẩu Giáo viên:");
        if(p === "Anphuc01") {
            isAdmin = true;
            document.getElementById('btnGV').innerText = "🔓 ĐÃ MỞ";
            if(currentItem) showExam(currentItem);
        } else if(p) alert("Sai mật khẩu!");
    }

    async function updateCodes() {
        const val = document.getElementById('inputCodes').value;
        const sheet = currentItem.year ? 'PeriodicData' : 'RegularData';
        await fetch(`${API}?action=updateCode&sheet=${sheet}&row=${currentItem.row}&code=${encodeURIComponent(val)}`);
        alert("Đã cập nhật!");
        init();
    }

    window.onload = init;
</script>
</body>
</html>
