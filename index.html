<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbzR-XUQ44Qa9232eKf2TDMcDwM6bQGdiJB7O0A8297KD0hztC7sJS6h0apDbNrvWW59PA/exec"; // Thay link /exec vào đây
  let regularData = [], periodicData = [], isAdmin = false, currentTab = 'regular', currentItem = null;

  async function callAPI(params) {
    const url = API_BASE + "?" + new URLSearchParams(params).toString();
    try {
      const response = await fetch(url);
      return await response.json();
    } catch (e) {
      console.error("Lỗi:", e);
      return null;
    }
  }

  async function init() {
    const regRes = await callAPI({ action: "getRegular" });
    if(regRes) regularData = regRes;
    const perRes = await callAPI({ action: "getPeriodic" });
    if(perRes) periodicData = perRes;
    document.getElementById('loading').style.display = 'none';
    renderSidebar();
  }
  window.onload = init;

  function renderSidebar() {
    const root = document.getElementById('sidebarContent');
    root.innerHTML = "";
    if(currentTab === 'regular') renderRegularTree(regularData, root);
    else renderPeriodicTree(periodicData, root);
  }

  // Cây thư mục Thường xuyên (3 cấp: Khối > Chương > Bài)
  function renderRegularTree(data, root) {
    const tree = {};
    data.forEach(item => {
      if (!tree[item.grade]) tree[item.grade] = {};
      if (!tree[item.grade][item.chapter]) tree[item.grade][item.chapter] = [];
      tree[item.grade][item.chapter].push(item);
    });
    root.appendChild(buildTreeHTML(tree, 'regular'));
  }

  // Cây thư mục Định kỳ (4 cấp: Khối > Năm > Kỳ thi > Tên bài)
  function renderPeriodicTree(data, root) {
    const tree = {};
    data.forEach(item => {
      if (!tree[item.grade]) tree[item.grade] = {};
      if (!tree[item.grade][item.year]) tree[item.grade][item.year] = {};
      if (!tree[item.grade][item.year][item.category]) tree[item.grade][item.year][item.category] = [];
      tree[item.grade][item.year][item.category].push(item);
    });

    const ul = document.createElement('ul');
    for (let grade in tree) {
      let li = document.createElement('li');
      li.innerHTML = `<span class="caret" onclick="toggleNested(this)">📂 ${grade}</span>`;
      let yearUl = document.createElement('ul'); yearUl.className = "nested";
      
      for (let year in tree[grade]) {
        let yearLi = document.createElement('li');
        yearLi.innerHTML = `<span class="caret" onclick="toggleNested(this)">📅 ${year}</span>`;
        let catUl = document.createElement('ul'); catUl.className = "nested";
        
        for (let cat in tree[grade][year]) {
          let catLi = document.createElement('li');
          catLi.innerHTML = `<span class="caret" onclick="toggleNested(this)">📝 ${cat}</span>`;
          let examUl = document.createElement('ul'); examUl.className = "nested";
          
          tree[grade][year][cat].forEach(exam => {
            let examLi = document.createElement('li');
            examLi.className = "item-leaf";
            examLi.innerText = "📄 " + exam.displayName;
            examLi.onclick = () => selectExam(exam, 'periodic');
            examUl.appendChild(examLi);
          });
          catLi.appendChild(examUl);
          catUl.appendChild(catLi);
        }
        yearLi.appendChild(catUl);
        yearUl.appendChild(yearLi);
      }
      li.appendChild(yearUl);
      ul.appendChild(li);
    }
    root.appendChild(ul);
  }

  function buildTreeHTML(tree, type) {
    const ul = document.createElement('ul');
    for (let level1 in tree) {
      let li = document.createElement('li');
      li.innerHTML = `<span class="caret" onclick="toggleNested(this)">▶ ${level1}</span>`;
      let subUl = document.createElement('ul'); subUl.className = "nested";
      for (let level2 in tree[level1]) {
        let subLi = document.createElement('li');
        subLi.innerHTML = `<span class="caret" onclick="toggleNested(this)">▶ ${level2}</span>`;
        let leafUl = document.createElement('ul'); leafUl.className = "nested";
        tree[level1][level2].forEach(item => {
          let leaf = document.createElement('li');
          leaf.className = "item-leaf";
          leaf.innerText = item.lesson || item.displayName;
          leaf.onclick = () => selectExam(item, type);
          leafUl.appendChild(leaf);
        });
        subLi.appendChild(leafUl);
        subUl.appendChild(subLi);
      }
      li.appendChild(subUl);
      ul.appendChild(li);
    }
    return ul;
  }

  function toggleNested(elm) {
    elm.parentElement.querySelector(".nested").classList.toggle("active");
    elm.innerText = elm.innerText.includes("▶") ? elm.innerText.replace("▶", "▼") : elm.innerText.replace("▼", "▶");
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderSidebar();
    document.getElementById('examCard').classList.add('hidden');
    document.getElementById('placeholder').style.display = 'block';
  }

  function selectExam(item, type) {
    currentItem = item;
    currentItem.dataType = type;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('examCard').classList.remove('hidden');
    document.getElementById('examTitle').innerText = item.displayName || item.lesson;
    renderCodes(item.code);
  }

  function renderCodes(codeStr) {
    const div = document.getElementById('codeList');
    div.innerHTML = "";
    if(!codeStr) { div.innerHTML = "Chưa có link thi"; return; }
    
    const codes = codeStr.toString().split(',').map(c=>c.trim()).filter(c=>c);
    codes.forEach(code => {
      let btn = document.createElement('div');
      btn.className = "code-btn";
      btn.innerHTML = `🚀 <b>Vào thi: ${code}</b>`;
      btn.onclick = () => {
         // Mở link trực tiếp nếu là URL, hoặc mở qua redirect base
         const url = code.startsWith('http') ? code : "https://google.com/search?q=" + encodeURIComponent(code);
         window.open(url, "_blank");
      };
      div.appendChild(btn);
    });
  }

  // Các hàm Admin (saveName, addCode, deleteCode, createNewExam) giữ nguyên logic cũ của bạn
</script>
