<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN PHÚC EDUCATION</title>
    <style>
        :root { --primary: #1e3a8a; --secondary: #1d4ed8; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Logo */
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        
        /* Tabs Hiệu ứng đẹp */
        .tabs { display: flex; background: #e2e8f0; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: all 0.3s ease; color: #475569; font-size: 14px; text-transform: uppercase; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 280px; background: var(--white); overflow-y: auto; padding: 15px; border-right: 1px solid #cbd5e1; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        /* Menu Tree */
        .caret { cursor: pointer; display: block; padding: 8px; border-radius: 6px; margin: 2px 0; font-weight: 500; }
        .caret:hover { background: #f1f5f9; }
        .nested { display: none; margin-left: 18px; list-style: none; padding-left: 5px; border-left: 1px solid #ddd; }
        .active-node { display: block; }
        .item-leaf { cursor: pointer; padding: 8px 12px; color: #334155; border-radius: 6px; margin: 2px 0; font-size: 0.95rem; }
        .item-leaf:hover { background: #dbeafe; color: var(--primary); }

        /* Exam Card Mobile Optimized */
        #examCard { width: 100%; max-width: 500px; text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .code-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .code-btn { padding: 15px; background: var(--white); border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .code-btn:hover { border-color: var(--primary); background: #f8fafc; }
        
        /* Admin Panel */
        .admin-box { margin-top: 20px; padding: 15px; background: #fffbeb; border: 1px dashed #f59e0b; border-radius: 10px; display: none; width: 100%; box-sizing: border-box; }
        input { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        .btn-save { background: #f59e0b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #loading { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; color: var(--primary); }
        .hidden { display: none; }
        @media (max-width: 600px) { .sidebar { width: 150px; } .tab-btn { font-size: 11px; } }
    </style>
</head>
<body>

<div id="loading">🚀 ĐANG TẢI DỮ LIỆU AN PHÚC...</div>

<header>
    <div class="logo-area">
        <img src="https://lh3.googleusercontent.com/d/1C3rl8ecm6unfYSwhoyZQEEcQZanliH5x" class="logo-img" alt="Logo">
        <span style="font-weight: bold; letter-spacing: 1px;">AN PHÚC EDUCATION</span>
    </div>
    <button onclick="adminLogin()" id="adminBtn" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">🔒 GV</button>
</header>

<div class="tabs">
    <button class="tab-btn active" id="btn-reg" onclick="switchTab('regular')">Kiểm tra Thường xuyên</button>
    <button class="tab-btn" id="btn-per" onclick="switchTab('periodic')">Kiểm tra Định kỳ</button>
</div>

<div class="main-container">
    <div class="sidebar" id="sidebarContent"></div>
    <div class="content-area">
        <div id="placeholder" style="text-align:center; color:#94a3b8; margin-top:50px;">
            <p style="font-size: 3rem; margin:0;">👆</p>
            <p>Chọn bài thi bên trái để vào làm bài</p>
        </div>
        <div id="examCard" class="hidden">
            <h2 id="examTitle" style="margin:0; color:var(--primary);"></h2>
            <p id="examSubTitle" style="color:#64748b; font-size:14px; margin-top:5px;"></p>
            <div class="code-grid" id="codeList"></div>

            <div id="adminPanel" class="admin-box">
                <p style="font-weight:bold; margin-top:0;">Chế độ Giáo viên</p>
                <input type="text" id="editCodes" placeholder="Nhập các mã đề, cách nhau dấu phẩy">
                <button class="btn-save" onclick="saveAdminData()">LƯU MÃ ĐỀ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbw_AYAntqOIHi6wspyVJz1K6Hu8ZLHn7rjSfByfbSfrhV4UhUuo08AfMjjBMxwfaQtqsg/exec";
    let regularData = [], periodicData = [], currentTab = 'regular', isAdmin = false, currentItem = null;

    async function init() {
        try {
            const [reg, per] = await Promise.all([
                fetch(API_BASE + "?action=getRegular").then(r => r.json()),
                fetch(API_BASE + "?action=getPeriodic").then(r => r.json())
            ]);
            regularData = reg; periodicData = per;
            document.getElementById('loading').style.display = 'none';
            renderSidebar();
        } catch (e) { alert("Lỗi kết nối dữ liệu!"); }
    }

    function renderSidebar() {
        const root = document.getElementById('sidebarContent');
        root.innerHTML = "";
        const ul = document.createElement('ul');
        ul.style.listStyle = "none"; ul.style.padding = "0";

        if (currentTab === 'regular') {
            const tree = {};
            regularData.forEach(item => {
                if (!tree[item.grade]) tree[item.grade] = {};
                if (!tree[item.grade][item.chapter]) tree[item.grade][item.chapter] = [];
                tree[item.grade][item.chapter].push(item);
            });
            buildTreeHTML(tree, ul, 'regular');
        } else {
            const tree = {};
            periodicData.forEach(item => {
                if (!tree[item.grade]) tree[item.grade] = {};
                if (!tree[item.grade][item.year]) tree[item.grade][item.year] = {};
                if (!tree[item.grade][item.year][item.category]) tree[item.grade][item.year][item.category] = [];
                tree[item.grade][item.year][item.category].push(item);
            });
            buildTreeHTML(tree, ul, 'periodic');
        }
        root.appendChild(ul);
    }

    function buildTreeHTML(data, parent, type) {
        for (let key in data) {
            let li = document.createElement('li');
            if (Array.isArray(data[key])) {
                li.innerHTML = `<span class="caret">📁 ${key}</span>`;
                let subUl = document.createElement('ul'); subUl.className = "nested";
                data[key].forEach(item => {
                    let leaf = document.createElement('li');
                    leaf.className = "item-leaf";
                    leaf.innerText = "📄 " + (item.lesson || item.displayName);
                    leaf.onclick = () => selectExam(item, type);
                    subUl.appendChild(leaf);
                });
                li.querySelector('.caret').onclick = function() { this.nextSibling.classList.toggle('active-node'); };
                li.appendChild(subUl);
            } else {
                li.innerHTML = `<span class="caret">📂 ${key}</span>`;
                let subUl = document.createElement('ul'); subUl.className = "nested";
                buildTreeHTML(data[key], subUl, type);
                li.querySelector('.caret').onclick = function() { this.nextSibling.classList.toggle('active-node'); };
                li.appendChild(subUl);
            }
            parent.appendChild(li);
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('btn-reg').classList.toggle('active', tab==='regular');
        document.getElementById('btn-per').classList.toggle('active', tab==='periodic');
        document.getElementById('examCard').classList.add('hidden');
        document.getElementById('placeholder').style.display = 'block';
        renderSidebar();
    }

    function selectExam(item, type) {
        currentItem = item;
        currentItem.sheet = (type === 'periodic') ? 'PeriodicData' : 'RegularData';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('examCard').classList.remove('hidden');
        document.getElementById('examTitle').innerText = item.lesson || item.displayName;
        document.getElementById('examSubTitle').innerText = (item.grade || "") + " - " + (item.chapter || item.category || "");
        
        const div = document.getElementById('codeList');
        div.innerHTML = "";
        if(!item.code) { div.innerHTML = "<p style='color:#94a3b8'>Chưa có mã đề</p>"; }
        else {
            item.code.toString().split(',').forEach(code => {
                let btn = document.createElement('button');
                btn.className = "code-btn";
                btn.innerHTML = `<span>VÀO THI:</span> <b style="color:var(--primary)">${code.trim()}</b>`;
                btn.onclick = () => {
                    const url = code.trim().startsWith('http') ? code.trim() : "https://google.com/search?q=" + encodeURIComponent(code.trim());
                    window.open(url, '_blank');
                };
                div.appendChild(btn);
            });
        }
        if(isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('editCodes').value = item.code || "";
        }
    }

    function adminLogin() {
        if(isAdmin) { isAdmin = false; document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminBtn').innerText = "🔒 GV"; return; }
        const p = prompt("Nhập mã bảo mật Giáo viên:");
        if(p === "Anphuc01") {
            isAdmin = true;
            document.getElementById('adminBtn').innerText = "🔓 ĐÃ MỞ";
            alert("Đã kích hoạt chế độ chỉnh sửa mã đề!");
            if(currentItem) selectExam(currentItem, currentItem.sheet === 'PeriodicData' ? 'periodic' : 'regular');
        } else if(p) { alert("Sai mã!"); }
    }

    async function saveAdminData() {
        const newCode = document.getElementById('editCodes').value;
        const res = await fetch(`${API_BASE}?action=updateCode&sheet=${currentItem.sheet}&row=${currentItem.row}&code=${encodeURIComponent(newCode)}`).then(r => r.json());
        if(res.success) {
            alert("Đã cập nhật mã đề thành công!");
            init(); // Tải lại dữ liệu
        }
    }

    window.onload = init;
</script>
</body>
</html>
